version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: potential-octo-postgres
    restart: always
    environment:
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_pass
      POSTGRES_DB: demo_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - potential-net

  backend:
    build: ./backend
    container_name: potential-octo-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/demo_db
      SPRING_DATASOURCE_USERNAME: demo_user
      SPRING_DATASOURCE_PASSWORD: demo_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/demo_db
    depends_on:
      - postgres
    networks:
      - potential-net

  frontend:
    build: ./frontend
    container_name: potential-octo-frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - potential-net

volumes:
  pgdata:

networks:
  potential-net:
    driver: bridge
